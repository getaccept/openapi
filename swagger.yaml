  /upload:
    post:
      summary: Upload a document file
      operationId: UploadDocument
      x-ms-visibility: important
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_id:
                    type: string
                    description: ID of the uploaded file to be used in file_ids when creating a document
                  file_status:
                    type: string
                    description: Status of the uploaded file
        '400':
          $ref: '#/components/responses/Invalid'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: |-
        You can upload one file at a time and get a file id. The file id is used to connect a file with a GetAccept document which is sent to recipients. If you want to upload mutliple files you run multiple POST. We only accept files up to 10 MB as default. Uploaded file need to be imported/added to a document within 48 hours after uploading.

        We recommended you to upload PDF files in order to guarantee the same look when sent. Other file types can be converted, such as:

        Mirosoft Office: doc, docx, xl, xls, xlsx, ppt, pptx
        Mac: numbers, key
        Images: jpg, jpeg, png
        Other: html, tex, csv
      tags:
        - Documents
      requestBody:
        required: true
        description: A JSON object containing the uploaded document information
        content:
          application/json:
            schema:
              type: object
              properties:
                file_name:
                  type: string
                  description: 'Filename of the document, with the extension. This will be helpful for converting different file-types.'
                  x-ms-summary: File name
                file_content:
                  type: string
                  description: Send the file as base64 encoded. Note that base64 encoding files will increase the file size with about 30%
                  x-ms-summary: File content
                file_url:
                  type: string
                  description: Url to document file. File must be available for download without any authorization
                  x-ms-summary: File URL
          multipart/form-data:
            schema:
              type: object
              x-ms-visibility: internal
              properties:
                file:
                  type: string
                  format: binary
                  description: Binary File
                  x-ms-summary: Binary File
