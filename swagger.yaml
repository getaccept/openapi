      parameters:
        - in: query
          name: filter
          schema:
            type: string
            enum:
              - active
              - inactive
              - signed
          description: Filter list on status
        - in: query
          name: sort_by
          schema:
            type: string
            enum:
              - name
              - email
              - company_name
              - document_count
              - created
          description: How to sort results
        - in: query
          name: sort_order
          schema:
            type: string
            enum:
              - asc
              - desc
          description: Sort order of results
        - in: query
          name: showteam
          schema:
            type: boolean
          description: Include documents from team members
        - in: query
          name: showall
          schema:
            type: boolean
          description: Include all contacts from entity
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
          description: Start list from record x
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
          description: Number of records to list
        - in: query
