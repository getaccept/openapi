  /subscriptions:
    post:
      summary: Subscribe to document events
      operationId: CreateSubscription
      x-ms-visibility: important
      x-ms-summary: When a document status changes
      x-ms-trigger: single
      x-ms-trigger-hint: Trigger when a document status is changed
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/Invalid'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: |-
        This call will create a new subscription.
        The response will be wrapped in an array even for single object according to REST hook standards.

        >Events
          * `document.created` - Document is created
          * `document.sent` - Document is sent
          * `document.viewed` - Document is sent
          * `document.signed` - Document is signed
          * `document.approved` - Document is approved
          * `document.expired` - Document has expired
          * `document.rejected` - Document is rejected
          * `document.downloaded` - Document is downloaded
          * `document.printed` - Document is printed
          * `document.forwarded` - Document is forwarded
          * `document.partially_signed` - Document has been partially signed
          * `document.commented` - Document is commented
          * `document.hardbounced` - Document is hardbounced
          * `document.imported` - Document is imported
      requestBody:
        required: true
        description: A JSON object containing subscription information
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  description: Event trigger
                  x-ms-summary: Select event
                  x-ms-visibility: important
                  enum:
                    - document.created
                    - document.sent
                    - document.viewed
                    - document.reviewed
                    - document.signed
                    - document.approved
                    - document.expired
                    - document.rejected
                    - document.downloaded
                    - document.printed
                    - document.forwarded
                    - document.partially_signed
                    - document.commented
                    - document.hardbounced
                    - document.imported
                  x-ms-dynamic-values:
                    operationId: ListSubscriptionEvents
                    value-path: value
                    value-title: name
                  example: document.signed
                target_url:
                  type: string
                  description: The URL to post payload to on event
                  x-ms-notification-url: true
                  x-ms-visibility: internal
                  example: 'https://abc.x.pipedream.net/'
                host:
                  type: string
                  description: The host name to send the post to
                  x-ms-visibility: internal
                payload:
                  type: string
                  description: Additional payload data to post
                  x-ms-summary: Payload
                  x-ms-visibility: advanced
                global:
                  type: boolean
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                  default: true
                  description: If the webhook should catch events for all entity users.
                  x-ms-summary: All entity users
                notification_email:
                  type: string
                  example: hostmaster@example.com
                  description: 'If the event fails, send a notification to this email instead of the sender'
                  x-ms-summary: Error email
                  x-ms-visibility: advanced
              required:
                - event
                - target_url
      tags:
        - Subscriptions
    x-ms-notification-content:
      schema:
        $ref: '#/components/schemas/Webhook'
    get:
      summary: List subscriptions
      x-ms-visibility: internal
      tags:
        - Subscriptions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscriptions'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: ListSubscriptions
      description: Receive a list of available subscriptions for the current entity.
