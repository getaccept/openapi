openapi: 3.0.0
info:
  title: GetAccept
  version: '1.6'
  contact:
    name: GetAccept API Team
    email: integrations@getaccept.com
    url: 'https://app.getaccept.com/api'
  termsOfService: 'https://www.getaccept.com/terms.html'
  description: 'GetAccept provides a sales enablement platform for sales to design, send, promote, track, and e-sign sales documents, leveraging sales collateral, contract management, proposals, and electronic signatures in one place.'
  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0.html'
paths:
  /auth:
    post:
      summary: Authentication by token
      tags:
        - Authentication
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Token to be used in consequtive requests using bearer header
                  expires_in:
                    description: Seconds until the access token expires
                    minimum: 0
                    format: int64
                    type: integer
        '400':
          $ref: '#/components/responses/Invalid'
      operationId: Authenticate
      description: |-
        Token based authentication is recommended for server-based access or access from clients where OAuth is not suitable. Access tokens has to be requested using an administrators login credentials.
        Requests should include the header Content-Type with value application/json
      x-ms-visibility: internal
      parameters: []
      security: []
      requestBody:
        required: true
        description: A JSON object containing authentication credentials
        content:
          application/json:
            schema:
              type: object
              x-examples:
                Example:
                  email: user@example.com
                  password: mysecret
              description: Authentication model
              properties:
                email:
                  type: string
                  format: email
                  description: This is the email of the user in GetAccept
                password:
                  type: string
                  format: password
                  description: This is the password of the user in GetAccept
                entity_id:
                  type: string
                  description: This specifies what entity to select if multiple entities are available for a user. If no value is specified the default entity will be selected.
                  default: ''
                client_id:
                  description: The client id of your app if you received one from our API team
                  type: string
                  default: ''
              required:
                - email
                - password
  /refresh:
    get:
      summary: Refresh an access token
      tags:
        - Authentication
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                    format: int64
      operationId: RefreshToken
      description: You can request a refreshed of the access token before the original token has expired.
      x-ms-visibility: internal
  '/refresh/{entityId}':
    get:
      summary: Switch entity
      tags:
        - Authentication
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: New access token for the entity
                  expires_in:
                    type: integer
                    format: int64
      operationId: SwitchEntity
      description: 'Change entity using the same refresh method with additional parameter for the entity. The response will include a new access token that should be used when accessing the new entity.'
      parameters:
        - in: path
          name: entityId
          required: true
          schema:
            type: string
          description: Entity ID to switch to
          x-ms-summary: Entity ID
      x-ms-visibility: internal
  /revoke:
    get:
      summary: Revoke access token
      tags:
        - Authentication
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: RevokeToken
      description: Revoke an access token before it has expired.
      x-ms-visibility: internal
  /test:
    get:
      summary: Test authentication
      tags:
        - Authentication
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: TestAuthentication
      description: Test authentication and get current entity and user ID.
  /notifications:
    get:
      summary: List notifications
      tags:
        - Others
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: ListNotifications
      description: List notification for current user
  /documents:
    get:
      summary: List documents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Documents'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: ListDocuments
      description: Get a list of available documents
      tags:
        - Documents
      parameters:
        - schema:
            type: string
            enum:
              - draft
              - sent
              - viewed
              - reviewed
              - signed
              - rejected
              - recalled
            example: signed
          in: query
          name: filter
          description: Filter list on status
          x-ms-summary: Filter list on status
          explode: false
        - schema:
            type: string
            enum:
              - name
              - value
              - created
              - recipient
              - status
              - owner
            example: created
          in: query
          name: sort_by
          description: How to sort results
          x-ms-summary: How to sort results
        - schema:
            type: string
            enum:
              - asc
              - desc
            example: desc
          in: query
          name: sort_order
          description: Sort order of results
          x-ms-summary: Sort order of results
        - schema:
            type: boolean
            enum:
              - true
              - false
            example: true
          in: query
          name: showteam
          description: Include documents from team members
          x-ms-summary: Include documents from team members
        - schema:
            type: boolean
            enum:
              - true
              - false
            example: true
          in: query
          name: showall
          description: Include all documents from entity
          x-ms-summary: Include all documents from entity
        - schema:
            type: string
          in: query
          name: external_id
          description: An external ID is a custom field which can contain a unique record identifier from a system outside of GetAccept
          x-ms-summary: External ID
        - schema:
            type: number
            example: 50
          in: query
          name: offset
          description: Start list from record x until limit
          x-ms-summary: Offset
        - schema:
            type: number
            example: 100
          in: query
          name: limit
          description: Number of records to list
          x-ms-summary: Limit
    post:
      summary: Create and send document or template
      operationId: CreateDocument
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/Invalid'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: |-
        You must create a document to be able to send it to a recipient. When creating a document you can refer to previously uploaded files with file_id or you can choose to create a document and upload the files in on API post. You can only upload ONE file when including a file in the create document POST.

        Use either file_ids parameter to use existing uploaded file(s), file_content to send the document as base64 encoded string or do a multipart post with file parameter.

        All recipients must have either a valid e-mail or a mobile number.

        All events are recorded using requestor IP address. You can override this using header CLIENT_IP containing the end-users public IP address.
      requestBody:
        required: true
        description: A JSON object containing document information
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Enter a name of the document
                  x-ms-summary: Document name
                  x-ms-visibility: important
                template_id:
                  type: string
                  description: Select a template to use for the sending
                  x-ms-summary: Template ID
                  x-ms-visibility: important
                  x-ms-dynamic-values:
                    operationId: ListTemplates
                    value-path: id
                    value-collection: templates
                    value-title: name
                type:
                  type: string
                  description: Set the type/category of the document
                  x-ms-summary: Document type
                  x-ms-visibility: important
                  enum:
                    - sales
                    - introduction
                    - hr
                    - other
                  example: sales
                  default: sales
                value:
                  type: number
                  format: float
                  description: Value of deal or document
                  x-ms-summary: Document value
                  x-ms-visibility: important
                  nullable: true
                sender_id:
                  type: string
                  description: Send from other user than authenticated
                  x-ms-summary: Sender user override
                  x-ms-visibility: advanced
                  x-ms-dynamic-values:
                    operationId: ListUsers
                    value-path: user_id
                    value-collection: users
                    value-title: email
                sender_email:
                  type: string
                  description: Send from other email than authenticated user
                  x-ms-summary: Sender email override
                  x-ms-visibility: advanced
                is_signing_initials:
                  type: boolean
                  description: Sign document using recipient initials
                  x-ms-summary: Sign with initials
                  x-ms-visibility: advanced
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                is_reminder_sending:
                  type: boolean
                  description: Should automatic reminders be sent
                  x-ms-summary: Send reminders
                  x-ms-visibility: advanced
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                is_automatic_sending:
                  type: boolean
                  description: If the document should be sent after creation
                  x-ms-summary: Send automatically
                  x-ms-visibility: important
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                video_id:
                  type: string
                  description: Select a video to use for the sending
                  x-ms-summary: Video ID
                  x-ms-visibility: advanced
                  x-ms-dynamic-values:
                    operationId: ListVideos
                    value-path: video_id
                    value-collection: videos
                    value-title: video_title
                attachments:
                  type: array
                  description: Attachments
                  x-ms-summary: Attachment
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: file or external where file is an uploaded file and external is a link to an external file
                        x-ms-summary: Type
                        enum:
                          - file
                          - external
                      id:
                        type: string
                        description: Attachment ID received from list or after upload
                        x-ms-summary: ID
                        x-ms-dynamic-values:
                          operationId: ListAttachments
                          value-path: attachment_id
                          value-collection: attachments
                          value-title: attachment_title
                      require_view:
                        type: boolean
                        description: Require that recipient view the attachment
                        x-ms-summary: Require view
                        nullable: true
                        enum:
                          - true
                          - false
                        example: true
                is_signing:
                  type: boolean
                  description: Should the document be sent for signing
                  x-ms-summary: Sign document
                  x-ms-visibility: advanced
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                is_sms_sending:
                  type: boolean
                  description: Should the document be sent to recipient mobile by text
                  x-ms-summary: Send SMS
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                file_ids:
                  type: string
                  description: 'Comma-separated, unique file-ids received when uploading files'
                  x-ms-summary: File IDs
                file_name:
                  type: string
                  description: 'Filename of the document, with the extension. This will be helpful for converting different file-types.'
                  x-ms-summary: File name
                file_content:
                  type: string
                  description: Base64 encoded file content
                  x-ms-summary: File content
                file_url:
                  type: string
                  description: Url to document file. Documents must be public available for download
                  x-ms-summary: File URL
                is_signing_forward:
                  type: boolean
                  description: Should recipients be able to transfer signature rights
                  x-ms-summary: Allow signature transfer
                  x-ms-visibility: advanced
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                recipients:
                  type: array
                  x-ms-summary: Recipient
                  items:
                    type: object
                    properties:
                      first_name:
                        type: string
                        description: Recipient first name
                        x-ms-summary: First name
                        x-ms-visibility: important
                      last_name:
                        type: string
                        description: Last name of recipient
                        x-ms-summary: Last name
                        x-ms-visibility: important
                      role:
                        type: string
                        description: The kind of recipient in the document
                        x-ms-summary: Recipient type
                        x-ms-visibility: important
                        enum:
                          - signer
                          - approver
                          - cc
                      role_name:
                        type: string
                        description: The name of the role in a template
                        x-ms-summary: Template role
                        x-ms-visibility: important
                      verify_qna_sign:
                        type: boolean
                        description: Should a question be asked before signing
                        x-ms-summary: Sign question
                        x-ms-visibility: advanced
                        nullable: true
                        enum:
                          - true
                          - false
                        example: true
                      verify_qna_question:
                        type: string
                        description: Question to ask for verification
                        x-ms-summary: Verification question
                        x-ms-visibility: advanced
                        example: Enter your SSN
                      verify_qna:
                        type: boolean
                        description: Should a question be asked
                        x-ms-summary: Enable question
                        x-ms-visibility: advanced
                        nullable: true
                        enum:
                          - true
                          - false
                        example: true
                      company_name:
                        type: string
                        description: Company name of the recipient
                        x-ms-summary: Company name
                        x-ms-visibility: important
                      company_number:
                        type: string
                        description: Company number of the recipient
                        x-ms-summary: Company number
                        x-ms-visibility: important
                      verify_qna_open:
                        type: boolean
                        description: Should question be asked before opening document
                        x-ms-summary: Question on open
                        x-ms-visibility: advanced
                        nullable: true
                        enum:
                          - true
                          - false
                        example: true
                      verify_qna_answer:
                        type: string
                        description: The answer to question
                        x-ms-summary: Verification answer
                        x-ms-visibility: advanced
                        example: '123456789'
                      verify_sms_sign:
                        type: boolean
                        description: Should a SMS verify the recipient before signing
                        x-ms-summary: Verify by SMS
                        x-ms-visibility: advanced
                        nullable: true
                        enum:
                          - true
                          - false
                        example: true
                      verify_eid_type:
                        type: string
                        description: EID type to be used for personal verification
                        x-ms-summary: EID type
                        x-ms-visibility: advanced
                      note:
                        type: string
                        description: Additional note for a recipient
                        x-ms-summary: Note
                        x-ms-visibility: advanced
                      email:
                        type: string
                        description: Email address of the recipient
                        x-ms-summary: Email
                        x-ms-visibility: important
                      mobile:
                        type: string
                        description: Mobile phone in international format
                        x-ms-summary: Mobile
                      verify_sms:
                        type: boolean
                        description: Verify recipient by SMS
                        x-ms-summary: Verify SMS
                        x-ms-visibility: advanced
                        nullable: true
                        enum:
                          - true
                          - false
                        example: true
                      verify_sms_open:
                        type: boolean
                        description: Verify SMS on open
                        x-ms-summary: Verify SMS on open
                        x-ms-visibility: advanced
                        enum:
                          - true
                          - false
                        example: true
                      order_num:
                        type: integer
                        format: int32
                        description: If signing order is enabled
                        x-ms-summary: Signing order
                        x-ms-visibility: advanced
                        nullable: true
                        example: 1
                      verify_eid:
                        type: boolean
                        description: Verify using EID
                        x-ms-summary: Verify EID
                        x-ms-visibility: advanced
                        nullable: true
                        enum:
                          - true
                          - false
                        example: true
                is_signing_biometric:
                  type: boolean
                  description: Use handwritten signature
                  x-ms-summary: Handwritten signature
                  x-ms-visibility: advanced
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                expiration_date:
                  type: string
                  description: Date and time when the document should expire
                  x-ms-summary: Expiration date
                  x-ms-visibility: advanced
                  format: date-time
                is_scheduled_sending:
                  type: boolean
                  description: Should the sending be scheduled for sending in the future
                  x-ms-summary: Schedule sending
                  x-ms-visibility: advanced
                  nullable: true
                  enum:
                    - true
                    - false
                  example: true
                scheduled_sending_time:
                  type: string
                  description: Date and time when the document should be sent out
                  x-ms-summary: Schedule send date
                  x-ms-visibility: advanced
                  format: date-time
                custom_fields:
                  type: array
                  description: Custom field
                  x-ms-summary: Custom
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: ID of custom template field
                        x-ms-summary: Field ID
                      name:
                        type: string
                        description: Name of custom template field
                        x-ms-summary: Field Name
                      value:
                        type: string
                        description: Value of custom template field
                        x-ms-summary: Field Value
                custom_pricing_tables:
                  type: array
                  description: Pricing
                  items:
                    type: object
                    properties:
                      id:
                        description: Table ID
                        type: string
                        x-ms-summary: Table ID
                        x-ms-visibility: advanced
                      display_name:
                        description: Display name of the pricing table
                        type: string
                        x-ms-summary: Display Name
                        x-ms-visibility: advanced
                      external_id:
                        description: External ID to represent the summary object within a third-party system
                        type: string
                        x-ms-summary: External ID
                        x-ms-visibility: advanced
                      pre_calculated:
                        description: If pricing table totals should be pre-calculated
                        enum:
                          - true
                          - false
                        example: true
                        default: false
                        type: boolean
                        x-ms-summary: Precalculated totals
                        x-ms-visibility: advanced
                      currency_settings:
                        description: Currency Settings
                        properties:
                          locale:
                            description: 'Locale, ex. sv-SE'
                            type: string
                            x-ms-summary: Locale
                          currency:
                            description: 'Currency, ex. SEK'
                            type: string
                            x-ms-summary: Currency
                        type: object
                        x-ms-summary: Currency Settings
                        x-ms-visibility: advanced
                      summary_values:
                        properties:
                          price:
                            properties:
                              value:
                                type: string
                                description: The value for summary price
                                x-ms-summary: Price Value
                              flat_fee:
                                description: If pricing table should use using flat fee pricing
                                enum:
                                  - true
                                  - false
                                example: true
                                nullable: true
                                type: boolean
                                x-ms-summary: Flat fee
                                x-ms-visibility: advanced
                              enabled:
                                description: If pricing table price should be enabled
                                enum:
                                  - true
                                  - false
                                example: true
                                nullable: true
                                type: boolean
                                x-ms-summary: Enabled
                                x-ms-visibility: advanced
                            type: object
                            x-ms-summary: Price
                          discount:
                            properties:
                              value:
                                type: string
                                description: The value for summary discount
                                x-ms-summary: Discount Value
                              flat_fee:
                                description: If pricing table should use using flat fee discounts
                                enum:
                                  - true
                                  - false
                                example: true
                                nullable: true
                                type: boolean
                                x-ms-summary: Flat fee
                                x-ms-visibility: advanced
                              enabled:
                                description: If pricing table discount should be enabled
                                enum:
                                  - true
                                  - false
                                example: true
                                nullable: true
                                type: boolean
                                x-ms-summary: Enabled
                                x-ms-visibility: advanced
                            type: object
                            x-ms-summary: Discount
                          tax:
                            properties:
                              value:
                                type: string
                                description: The value for summary tax
                                x-ms-summary: Value
                              flat_fee:
                                description: If pricing table should use using flat fee taxes
                                enum:
                                  - true
                                  - false
                                example: true
                                nullable: true
                                type: boolean
                                x-ms-summary: Flat fee
                                x-ms-visibility: advanced
                              enabled:
                                description: If pricing table tax should be enabled
                                enum:
                                  - true
                                  - false
                                example: true
                                nullable: true
                                type: boolean
                                x-ms-summary: Enabled
                                x-ms-visibility: advanced
                            type: object
                            x-ms-summary: Tax
                        type: object
                        x-ms-summary: Summary Values
                        x-ms-visibility: advanced
                      sections:
                        type: array
                        description: Sections
                        items:
                          type: object
                          properties:
                            id:
                              description: Section ID
                              type: string
                              x-ms-summary: ID
                            display_name:
                              description: Display name of the pricing table
                              type: string
                              x-ms-summary: Display Name
                            section_summary:
                              type: object
                              properties:
                                price:
                                  properties:
                                    value:
                                      type: string
                                      description: The value for section price
                                      x-ms-summary: Price Value
                                    flat_fee:
                                      description: If section should use using flat fee pricing
                                      enum:
                                        - true
                                        - false
                                      example: true
                                      nullable: true
                                      type: boolean
                                      x-ms-summary: Flat fee
                                    enabled:
                                      description: If section price should be enabled
                                      enum:
                                        - true
                                        - false
                                      example: true
                                      nullable: true
                                      type: boolean
                                      x-ms-summary: Enabled
                                  type: object
                                  x-ms-summary: Price
                                discount:
                                  properties:
                                    value:
                                      type: string
                                      description: The value for section discount
                                      x-ms-summary: Discount Value
                                    flat_fee:
                                      description: If section should use using flat fee discounts
                                      enum:
                                        - true
                                        - false
                                      example: true
                                      nullable: true
                                      type: boolean
                                      x-ms-summary: Flat fee
                                    enabled:
                                      description: If section discount should be enabled
                                      enum:
                                        - true
                                        - false
                                      example: true
                                      nullable: true
                                      type: boolean
                                      x-ms-summary: Enabled
                                  type: object
                                  x-ms-summary: Discount
                                tax:
                                  properties:
                                    value:
                                      type: string
                                      description: The value for section tax
                                      x-ms-summary: Tax Value
                                    flat_fee:
                                      description: If section should use using flat fee taxes
                                      enum:
                                        - true
                                        - false
                                      example: true
                                      nullable: true
                                      type: boolean
                                      x-ms-summary: Flat fee
                                    enabled:
                                      description: If section tax should be enabled
                                      enum:
                                        - true
                                        - false
                                      example: true
                                      nullable: true
                                      type: boolean
                                      x-ms-summary: Enabled
                                  type: object
                                  x-ms-summary: Tax
                              x-ms-summary: Summary Values
                            rows:
                              additionalProperties: 
                                type: array
                                items:
                                  type: object
                              example: [{ "values": [{"column_id": "abc123", "value": "My product"}, {"column_id": "def456", "value": 240}] } ]
                              description: Array with values object with array of column_id, value
                              x-ms-summary: Rows
                        x-ms-summary: Section
                        x-ms-visibility: advanced
                  x-ms-summary: Pricing
                  x-ms-visibility: advanced
                external_id:
                  type: string
                  description: External system ID for identification
                  x-ms-summary: External ID
      tags:
        - Documents
  /users:
    get:
      summary: List users
      tags:
        - Users
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: ListUsers
      description: Fetch a list of active users for the current authenticated entity
    post:
      summary: Create user
      tags:
        - Users
      operationId: CreateUser
      x-ms-visibility: important
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Invalid'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: This will create a new contact in the database for the current entity
      requestBody:
        required: true
        description: A JSON object containing user information
        content:
          application/json:
            schema:
              type: object
              properties:
                fullname:
                  type: string
                  description: Use to specify full name instead of first/last name
                first_name:
                  type: string
                  description: First name of the contact
                last_name:
                  type: string
                  description: Last name of the contact
                email:
                  type: string
                  description: Email address of the contact
                title:
                  type: string
                  description: 'The title of the contact, ex. CEO, Sales manager'
                phone:
                  type: string
                  description: Phone number in international format
                mobile:
                  type: string
                  description: Mobile number in international format
                note:
                  type: string
                  description: Optional internal note for contact
                company_name:
                  type: string
                  description: Associated company name
                company_number:
                  type: string
                  description: Associated company number
            examples:
              Example:
                value:
                  first_name: Jane
                  last_name: Doe
